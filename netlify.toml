[build]
  command = "npm run build"
  publish = "dist"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

# Increase body size limit for base64 image uploads (default 6MB → raise to 10MB)
[functions.chat]
  max_unzipped_function_size = 52428800

# SPA fallback
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200